<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据后台 - JINSHAN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        /* 登录页面 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; color: #ffd700; }
        .login-box p { color: #888; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-box input:focus { outline: none; border-color: #ffd700; }
        .login-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .login-box button:hover { transform: scale(1.05); }
        .error-msg { color: #ff6b6b; margin-top: 15px; display: none; font-size: 14px; }
        
        /* 后台页面 */
        .dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .dashboard-header h1 { color: #ffd700; font-size: 24px; }
        .logout-btn {
            padding: 10px 25px;
            border: 1px solid #ff6b6b;
            background: transparent;
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: #ff6b6b; color: #fff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card .icon { font-size: 40px; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #ffd700; }
        .stat-card .label { color: #888; margin-top: 5px; }
        .recent-section { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 25px; }
        .recent-section h2 { margin-bottom: 20px; color: #ffd700; }
        .recent-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .recent-item:last-child { border-bottom: none; }
        .recent-item .time { color: #888; }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ffd700;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>数据后台</h1>
            <p>请输入访问密码</p>
            <input type="password" id="passwordInput" placeholder="输入密码..." onkeypress="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">进入后台</button>
            <div class="error-msg" id="errorMsg">密码错误，请重试</div>
        </div>
    </div>
    
    <!-- 后台页面 -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>数据统计后台</h1>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👁️</div>
                <div class="number" id="views">0</div>
                <div class="label">页面浏览量</div>
            </div>
            <div class="stat-card">
                <div class="icon">📥</div>
                <div class="number" id="downloads">0</div>
                <div class="label">总下载次数</div>
            </div>
            <div class="stat-card">
                <div class="icon">💻</div>
                <div class="number" id="windows">0</div>
                <div class="label">Windows 下载</div>
            </div>
            <div class="stat-card">
                <div class="icon">🍎</div>
                <div class="number" id="mac">0</div>
                <div class="label">macOS 下载</div>
            </div>
            <div class="stat-card">
                <div class="icon">🐧</div>
                <div class="number" id="linux">0</div>
                <div class="label">Linux 下载</div>
            </div>
            <div class="stat-card">
                <div class="icon">📱</div>
                <div class="number" id="mobile">0</div>
                <div class="label">移动端访问</div>
            </div>
        </div>
        
        <div class="recent-section">
            <h2>最近动态</h2>
            <div id="recentList"></div>
        </div>
        
        <a href="index.html" class="back-link">← 返回主页</a>
    </div>
    
    <script>
        const PASSWORD = 'JINSHAN0403';
        
        // 模拟数据
        let stats = {
            views: 12847,
            downloads: 3245,
            windows: 2156,
            mac: 723,
            linux: 366,
            mobile: 4521,
            recent: [
                { action: 'Windows 下载', time: '2 分钟前' },
                { action: '页面浏览', time: '5 分钟前' },
                { action: 'macOS 下载', time: '8 分钟前' },
                { action: '页面浏览', time: '12 分钟前' },
                { action: '移动端访问', time: '15 分钟前' }
            ]
        };
        
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        function loadStats() {
            document.getElementById('views').textContent = stats.views.toLocaleString();
            document.getElementById('downloads').textContent = stats.downloads.toLocaleString();
            document.getElementById('windows').textContent = stats.windows.toLocaleString();
            document.getElementById('mac').textContent = stats.mac.toLocaleString();
            document.getElementById('linux').textContent = stats.linux.toLocaleString();
            document.getElementById('mobile').textContent = stats.mobile.toLocaleString();
            
            const recentList = document.getElementById('recentList');
            recentList.innerHTML = stats.recent.map(item => `
                <div class="recent-item">
                    <span>${item.action}</span>
                    <span class="time">${item.time}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
