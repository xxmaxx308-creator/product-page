<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计面板 - AI-Figma转React</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stats-header h1 {
            font-size: 1.8rem;
            color: #1e293b;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .stat-card-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .stat-card-label {
            color: #64748b;
            font-size: 1rem;
        }

        .stat-card-change {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .stat-card-change.positive {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .stat-card-change.neutral {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .stats-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 20px;
            padding: 20px 0;
        }

        .chart-bar {
            flex: 1;
            max-width: 100px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            min-height: 20px;
        }

        .chart-bar:hover {
            transform: scaleY(1.05);
            filter: brightness(1.1);
        }

        .chart-bar-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #64748b;
            white-space: nowrap;
        }

        .chart-bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
        }

        .data-table tr:hover {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge-windows {
            background: rgba(0, 120, 212, 0.1);
            color: #0078d4;
        }

        .badge-mac {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .badge-linux {
            background: rgba(255, 165, 0, 0.1);
            color: #f90;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .refresh-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-updated {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 968px) {
            .two-cols {
                grid-template-columns: 1fr;
            }

            .stats-header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="stats-container">
        <a href="download-page.html" class="back-link">← 返回下载页面</a>

        <div class="stats-header">
            <div>
                <h1>📊 数据统计面板</h1>
                <p class="last-updated">最后更新: <span id="lastUpdated">--</span></p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="refreshStats()">🔄 刷新数据</button>
                <button class="btn btn-primary" onclick="exportStats()">📥 导出数据</button>
                <button class="btn btn-danger" onclick="resetStats()">🗑️ 重置数据</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-icon">👁️</div>
                <div class="stat-card-value" id="totalViews">0</div>
                <div class="stat-card-label">页面总访问量</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">📥</div>
                <div class="stat-card-value" id="totalDownloads">0</div>
                <div class="stat-card-label">下载总次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">⏱️</div>
                <div class="stat-card-value" id="avgSessionTime">0s</div>
                <div class="stat-card-label">平均停留时间</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🎯</div>
                <div class="stat-card-value" id="totalClicks">0</div>
                <div class="stat-card-label">总点击次数</div>
            </div>
        </div>

        <div class="stats-section">
            <h2 class="section-title">📈 最近7天访问趋势</h2>
            <div class="chart-container" id="chartContainer">
                <!-- 图表将在这里生成 -->
            </div>
        </div>

        <div class="two-cols">
            <div class="stats-section">
                <h2 class="section-title">💻 平台使用分布</h2>
                <table class="data-table" id="platformTable">
                    <thead>
                        <tr>
                            <th>平台</th>
                            <th>下载次数</th>
                            <th>占比</th>
                            <th>趋势</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 数据将在这里生成 -->
                    </tbody>
                </table>
            </div>

            <div class="stats-section">
                <h2 class="section-title">🔔 功能点击排行</h2>
                <table class="data-table" id="featuresTable">
                    <thead>
                        <tr>
                            <th>功能</th>
                            <th>点击次数</th>
                            <th>占比</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 数据将在这里生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="stats-section">
            <h2 class="section-title">📋 详细数据记录</h2>
            <div id="detailedData">
                <!-- 详细数据将在这里生成 -->
            </div>
        </div>

        <div class="refresh-info" style="text-align: center; margin-top: 20px;">
            <span class="live-indicator"></span>
            <span>实时追踪中 - 页面访问时数据会自动更新</span>
        </div>
    </div>

    <script>
        // 功能名称映射
        const featureNames = {
            'ai': '🤖 AI智能转换',
            'speed': '⚡ 极速生成',
            'quality': '✨ 代码质量',
            'support': '🛠️ 全面支持'
        };

        // 刷新统计数据
        function refreshStats() {
            const stats = window.getStats();
            if (!stats) {
                alert('无法获取统计数据，请确保已访问下载页面');
                return;
            }

            // 更新概览卡片
            document.getElementById('totalViews').textContent = formatNumber(stats.totalViews);
            
            // 计算总下载次数
            let totalDownloads = 0;
            for (const platform in stats.clicks.download) {
                totalDownloads += stats.clicks.download[platform];
            }
            document.getElementById('totalDownloads').textContent = formatNumber(totalDownloads);
            
            // 平均停留时间
            const avgTime = Math.round(stats.avgSessionTime / 1000);
            document.getElementById('avgSessionTime').textContent = formatTime(avgTime);
            
            // 总点击次数
            let totalClicks = totalDownloads + 
                            Object.values(stats.clicks.platform).reduce((a, b) => a + b, 0) +
                            Object.values(stats.clicks.features).reduce((a, b) => a + b, 0) +
                            stats.clicks.cta +
                            stats.clicks.qr;
            document.getElementById('totalClicks').textContent = formatNumber(totalClicks);

            // 更新时间戳
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();

            // 更新图表
            updateChart(stats);

            // 更新平台表格
            updatePlatformTable(stats);

            // 更新功能表格
            updateFeaturesTable(stats);

            // 更新详细数据
            updateDetailedData(stats);
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toString();
        }

        // 格式化时间
        function formatTime(seconds) {
            if (seconds >= 60) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}分${secs}秒`;
            }
            return seconds + '秒';
        }

        // 更新图表
        function updateChart(stats) {
            const container = document.getElementById('chartContainer');
            const last7Days = stats.last7DaysStats || [];
            
            const maxViews = Math.max(...last7Days.map(d => d.views || 0), 1);
            
            let chartHTML = '';
            
            last7Days.forEach(day => {
                const height = ((day.views || 0) / maxViews * 100).toFixed(1);
                const dateParts = day.date.split('-');
                const monthDay = `${dateParts[1]}/${dateParts[2]}`;
                
                chartHTML += `
                    <div class="chart-bar" style="height: ${Math.max(height, 5)}%;">
                        <span class="chart-bar-value">${day.views || 0}</span>
                        <span class="chart-bar-label">${monthDay}</span>
                    </div>
                `;
            });
            
            container.innerHTML = chartHTML || '<div class="empty-state"><div class="empty-state-icon">📊</div><p>暂无数据</p></div>';
        }

        // 更新平台表格
        function updatePlatformTable(stats) {
            const tbody = document.querySelector('#platformTable tbody');
            const distribution = stats.platformDistribution || {};
            
            let totalClicks = Object.values(distribution).reduce((sum, p) => sum + p.count, 0);
            
            let html = '';
            
            ['windows', 'mac', 'linux'].forEach(platform => {
                const data = distribution[platform] || { count: 0, percentage: 0 };
                const badgeClass = `badge-${platform}`;
                
                html += `
                    <tr>
                        <td><span class="badge ${badgeClass}">${platform.toUpperCase()}</span></td>
                        <td>${data.count}</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-bar-fill" style="width: ${data.percentage}%"></div>
                            </div>
                            ${data.percentage}%
                        </td>
                        <td>${totalClicks > 0 ? ((data.count / totalClicks * 100)).toFixed(1) : 0}%</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html || '<tr><td colspan="4">暂无数据</td></tr>';
        }

        // 更新功能表格
        function updateFeaturesTable(stats) {
            const tbody = document.querySelector('#featuresTable tbody');
            const features = stats.topFeatures || [];
            
            let totalClicks = Object.values(stats.clicks.features).reduce((a, b) => a + b, 0);
            
            let html = '';
            
            if (features.length === 0) {
                html = '<tr><td colspan="3">暂无数据</td></tr>';
            } else {
                features.forEach((item, index) => {
                    const name = featureNames[item.id] || item.id;
                    const percentage = totalClicks > 0 ? ((item.count / totalClicks) * 100).toFixed(1) : 0;
                    
                    html += `
                        <tr>
                            <td>${name}</td>
                            <td>${item.count}</td>
                            <td>
                                <div class="progress-bar">
                                    <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                                </div>
                                ${percentage}%
                            </td>
                        </tr>
                    `;
                });
            }
            
            tbody.innerHTML = html;
        }

        // 更新详细数据
        function updateDetailedData(stats) {
            const container = document.getElementById('detailedData');
            
            const todayStats = stats.todayStats || {};
            const session = stats.currentSession || {};
            
            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>指标</th>
                            <th>今日数据</th>
                            <th>本次会话</th>
                            <th>历史总计</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>页面浏览</td>
                            <td>${todayStats.views || 0}</td>
                            <td>${session.pageViews || 1}</td>
                            <td>${stats.totalViews || 0}</td>
                        </tr>
                        <tr>
                            <td>下载点击</td>
                            <td>${todayStats.clicks?.download || 0}</td>
                            <td>${session.clicks?.download ? Object.values(session.clicks.download).reduce((a,b) => a+b, 0) : 0}</td>
                            <td>${stats.clicks?.download ? Object.values(stats.clicks.download).reduce((a,b) => a+b, 0) : 0}</td>
                        </tr>
                        <tr>
                            <td>平台切换</td>
                            <td>${todayStats.clicks?.platform ? Object.values(todayStats.clicks.platform).reduce((a,b) => a+b, 0) : 0}</td>
                            <td>${session.clicks?.platform ? Object.values(session.clicks.platform).reduce((a,b) => a+b, 0) : 0}</td>
                            <td>${stats.clicks?.platform ? Object.values(stats.clicks.platform).reduce((a,b) => a+b, 0) : 0}</td>
                        </tr>
                        <tr>
                            <td>功能查看</td>
                            <td>${todayStats.clicks?.features ? Object.values(todayStats.clicks.features).reduce((a,b) => a+b, 0) : 0}</td>
                            <td>${session.clicks?.features?.length || 0}</td>
                            <td>${stats.clicks?.features ? Object.values(stats.clicks.features).reduce((a,b) => a+b, 0) : 0}</td>
                        </tr>
                        <tr>
                            <td>CTA点击</td>
                            <td>${todayStats.clicks?.cta || 0}</td>
                            <td>${session.clicks?.cta || 0}</td>
                            <td>${stats.clicks?.cta || 0}</td>
                        </tr>
                        <tr>
                            <td>二维码扫描</td>
                            <td>${todayStats.clicks?.qr || 0}</td>
                            <td>${session.clicks?.qr || 0}</td>
                            <td>${stats.clicks?.qr || 0}</td>
                        </tr>
                        <tr>
                            <td>停留时间</td>
                            <td>-</td>
                            <td>${formatTime(Math.round((Date.now() - stats.sessionStartTime) / 1000))}</td>
                            <td>平均 ${formatTime(Math.round(stats.avgSessionTime / 1000))}</td>
                        </tr>
                    </tbody>
                </table>
            `;
        }

        // 导出统计数据
        function exportStats() {
            window.exportStats();
        }

        // 重置统计数据
        function resetStats() {
            if (window.resetStats()) {
                refreshStats();
            }
        }

        // 页面加载时刷新数据
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(refreshStats, 500);
            
            // 每5秒自动刷新
            setInterval(refreshStats, 5000);
        });
    </script>
</body>
</html>
